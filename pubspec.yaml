name: biblia_sagrada
description: Bíblia Sagrada Evangélica Completa - App de estudo bíblico
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Local Database
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2

  # Firebase (Backup)
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1

  # UI / Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  flex_color_scheme: ^8.1.0

  # PDF Export
  pdf: ^3.11.0
  printing: ^5.13.4
  share_plus: ^10.1.4

  # Search / Utils
  flutter_typeahead: ^5.2.0
  string_similarity: ^2.0.1

  # Icons
  iconsax: ^0.0.8

  # Hive for quick key-value storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Internationalization
  intl: ^0.19.0

  # Font Awesome for biblical icons
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/bibles/
    - assets/dictionaries/
    - assets/commentaries/
    - assets/fonts/

  fonts:
    - family: NotoSerif
      fonts:
        - asset: assets/fonts/NotoSerif-Regular.ttf
        - asset: assets/fonts/NotoSerif-Bold.ttf
          weight: 700
    - family: NotoSansHebrew
      fonts:
        - asset: assets/fonts/NotoSansHebrew-Regular.ttf
    - family: NotoSansGreek
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
